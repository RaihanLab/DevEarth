<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DevEarth — Watch the world code in real time.">
  <title>DevEarth — Watch the World Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div id="loading-screen">
    <div class="loader-content">
      <div class="loader-globe"></div>
      <div class="loader-text">DEVEARTH</div>
      <div class="loader-sub">Initializing Earth systems...</div>
      <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
    </div>
  </div>

  <canvas id="globe-canvas"></canvas>

  <div id="ui-overlay">
    <header class="hud-header">
      <div class="hud-logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">DEV<span>EARTH</span></span>
      </div>
      <div class="hud-tagline">Watch the world code in real time</div>
      <div class="hud-status">
        <span class="status-dot"></span>
        <span id="statusText">CONNECTING...</span>
      </div>
    </header>

    <div class="stats-panel" id="statsPanel">
      <div class="stat-block">
        <div class="stat-val" id="statCommits">0</div>
        <div class="stat-key">COMMITS / MIN</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-block">
        <div class="stat-val" id="statTotal">0</div>
        <div class="stat-key">TOTAL TODAY</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-block">
        <div class="stat-val" id="statCountries">0</div>
        <div class="stat-key">COUNTRIES</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-block">
        <div class="stat-val" id="statDevs">0</div>
        <div class="stat-key">DEVELOPERS</div>
      </div>
    </div>

    <div class="lang-legend" id="langLegend">
      <div class="legend-title">LANGUAGES</div>
      <div class="legend-items" id="legendItems"></div>
    </div>

    <div class="commit-feed" id="commitFeed">
      <div class="feed-title">LIVE FEED</div>
      <div class="feed-list" id="feedList"></div>
    </div>

    <div class="controls-hint">
      <span>🖱 DRAG</span> to rotate &nbsp;·&nbsp; <span>⚲ SCROLL</span> to zoom &nbsp;·&nbsp; <span>C</span> cinematic mode
    </div>
  </div>

  <div id="commit-tooltip" class="commit-tooltip hidden"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="assets/js/stars.js"></script>
  <script src="assets/js/globe.js"></script>
  <script src="assets/js/pulses.js"></script>
  <script src="assets/js/github.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
